<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WFS Escalation Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        walmart: {
                            blue: '#0053e2',
                            spark: '#ffc220',
                            'blue-hover': '#0046c7',
                            'blue-pressed': '#00389f',
                        },
                    },
                },
            },
        };
    </script>
    <style>
        /* Myriad Pro font stack */
        body { 
            font-family: "Myriad Pro", "Myriad", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        }
        
        /* The Spark "Breathe & Spin" Animation */
        @keyframes spark-breathe {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.6); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .animate-spin-spark {
            animation: spark-breathe 3s ease-in-out infinite;
            transform-origin: center; /* Ensures it spins around its middle */
        }
        
        .text-wmt-yellow {
            color: #ffc220;
        }
        
        /* Hide loading spark by default */
        .htmx-request .loading-spark {
            display: inline-block;
        }
        
        .loading-spark {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Nav -->
    <nav class="bg-walmart-blue text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <!-- Walmart Spark Icon -->
                <svg class="h-10 w-10 text-walmart-spark" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <g>
                        <rect x="11" y="1" width="2" height="8" rx="1" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(60 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(120 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(180 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(240 12 12)" />
                        <rect x="11" y="1" width="2" height="8" rx="1" transform="rotate(300 12 12)" />
                    </g>
                </svg>
                <div>
                    <div class="font-bold text-lg">WFS Escalation + PO Flip</div>
                    <div class="text-xs text-blue-200">Trailer Ops Intelligence</div>
                </div>
            </div>
            <div class="flex space-x-6 text-sm font-semibold">
                <a href="/" class="hover:text-walmart-spark transition">Home</a>
                <a href="/escalation" class="hover:text-walmart-spark transition">Escalation Lookup</a>
                <a href="/po-flip" class="hover:text-walmart-spark transition">PO Flip Request</a>
                <a href="/monitor" class="hover:text-walmart-spark transition">Monitor</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12 py-6 text-center text-sm text-gray-600">
        <p>Created by <strong class="text-walmart-blue">Ali Ouzidane</strong> and <strong class="text-walmart-blue">Trey Toolson</strong></p>
    </footer>
</body>
</html>
