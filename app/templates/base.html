<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WFS Escalation Tool{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='%23ffc220' transform='translate(50,50)'><rect x='-4' y='-45' width='8' height='38' rx='4'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(60)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(120)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(180)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(240)'/><rect x='-4' y='-45' width='8' height='38' rx='4' transform='rotate(300)'/></g><text x='50' y='62' font-family='sans-serif' font-weight='900' font-size='38' text-anchor='middle' fill='%230053e2' stroke='white' stroke-width='4' paint-order='stroke'>WFS</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        walmart: {
                            blue: '#0053e2',
                            spark: '#ffc220',
                            'blue-hover': '#0046c7',
                            'blue-pressed': '#00389f',
                        },
                    },
                },
            },
        };
    </script>
    <style>
        /* Myriad Pro font stack */
        body { 
            font-family: "Myriad Pro", "Myriad", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        }
        
        /* The Spark "Breathe & Spin" Animation */
        @keyframes spark-breathe {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.6); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .animate-spin-spark {
            animation: spark-breathe 3s ease-in-out infinite;
            transform-origin: center; /* Ensures it spins around its middle */
        }
        
        .text-wmt-yellow {
            color: #ffc220;
        }
        
        /* Hide loading spark by default */
        .htmx-request .loading-spark {
            display: inline-block;
        }
        
        .loading-spark {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Nav -->
    {% set current_path = request.url.path if request and request.url else '/' %}
    <nav class="bg-walmart-blue text-white shadow-lg">
        <div class="container mx-auto flex flex-col gap-4 px-6 py-4 lg:flex-row lg:items-end lg:justify-between">
            <div class="flex items-center space-x-2">
                <!-- WFS Spark Logo -->
                <svg class="h-10 w-10" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <g fill="#ffc220" transform="translate(50,50)">
                        <rect x="-4" y="-45" width="8" height="38" rx="4"/>
                        <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(60)"/>
                        <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(120)"/>
                        <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(180)"/>
                        <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(240)"/>
                        <rect x="-4" y="-45" width="8" height="38" rx="4" transform="rotate(300)"/>
                    </g>
                    <text x="50" y="62" font-family="sans-serif" font-weight="900" font-size="38" text-anchor="middle" fill="#0053e2" stroke="white" stroke-width="4" paint-order="stroke">WFS</text>
                </svg>
                <div>
                    <div class="font-bold text-lg">WFS Escalation + PO Flip</div>
                    <div class="text-xs text-blue-200">Trailer Ops Intelligence</div>
                </div>
            </div>
            <div class="flex flex-wrap items-end gap-2 text-sm font-semibold" aria-label="Primary navigation">
                <a
                    href="/"
                    class="inline-flex items-center rounded-t-lg border border-white/20 px-4 py-2 transition {% if current_path == '/' %}bg-white text-walmart-blue shadow-sm{% else %}text-white hover:bg-white/10 hover:text-walmart-spark{% endif %}"
                    {% if current_path == '/' %}aria-current="page"{% endif %}
                >Home</a>
                <a
                    href="/escalation"
                    class="inline-flex items-center rounded-t-lg border border-white/20 px-4 py-2 transition {% if current_path.startswith('/escalation') %}bg-white text-walmart-blue shadow-sm{% else %}text-white hover:bg-white/10 hover:text-walmart-spark{% endif %}"
                    {% if current_path.startswith('/escalation') %}aria-current="page"{% endif %}
                >Escalation Lookup</a>
                <a
                    href="/po-flip"
                    class="inline-flex items-center rounded-t-lg border border-white/20 px-4 py-2 transition {% if current_path.startswith('/po-flip') %}bg-white text-walmart-blue shadow-sm{% else %}text-white hover:bg-white/10 hover:text-walmart-spark{% endif %}"
                    {% if current_path.startswith('/po-flip') %}aria-current="page"{% endif %}
                >PO Flip Request</a>
                <a
                    href="/fc-capacity"
                    class="inline-flex items-center rounded-t-lg border border-white/20 px-4 py-2 transition {% if current_path.startswith('/fc-capacity') %}bg-white text-walmart-blue shadow-sm{% else %}text-white hover:bg-white/10 hover:text-walmart-spark{% endif %}"
                    {% if current_path.startswith('/fc-capacity') %}aria-current="page"{% endif %}
                >FC Capacity</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12 py-6 text-center text-sm text-gray-600">
        <p>Created by <strong class="text-walmart-blue">Ali Ouzidane</strong> and <strong class="text-walmart-blue">Trey Toolson</strong></p>
    </footer>
</body>
</html>
