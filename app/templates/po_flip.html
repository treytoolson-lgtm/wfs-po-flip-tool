{% extends "base.html" %}

{% block title %}PO Flip Request{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-green-700 mb-6">Mode 2: PO Flip Request</h1>

    <div class="bg-white rounded-lg shadow-lg p-8">
        <p class="text-gray-700 mb-6">
            Enter a <strong>WFA PO number</strong> to pre-fill all flip request fields from BigQuery.
            Then select your requested FC and submit to SharePoint.
        </p>

        <form hx-post="/po-flip/lookup" hx-target="#form-container" hx-indicator="#po-spinner" class="mb-8">
            <label for="po_number" class="block font-semibold text-gray-800 mb-2">WFA PO Number:</label>
            <div class="flex gap-3">
                <input
                    type="text"
                    id="po_number"
                    name="po_number"
                    class="flex-1 border-2 border-gray-300 rounded-lg p-3 focus:border-green-600 focus:outline-none"
                    placeholder="6577303WFA"
                    required
                />
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition">
                    Lookup
                </button>
            </div>
            <span id="po-spinner" class="htmx-indicator block mt-2 text-gray-500">⌛ Querying BQ...</span>
        </form>

        <!-- Form will load here -->
        <div id="form-container"></div>
    </div>
</div>
{% endblock %}
